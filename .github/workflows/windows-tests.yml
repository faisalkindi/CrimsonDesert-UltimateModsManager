name: Windows tests

# Fast per-PR feedback, with the heavy tests split off.
#
# The full-table iteminfo round-trip tests (test_f3_whole_table_growth,
# test_iteminfo_pabgh_companion, test_iteminfo_cd110_layout) parse and
# serialize the real ~6k-record / 5.5MB iteminfo.pabgb in pure Python --
# ~150-530s EACH. Those ~10 tests were the entire reason the suite took
# 25+ min and blew the 15-min cap. They are marked `slow` and run in the
# slow-tests job (master pushes + nightly + on demand) instead of gating
# every PR, so per-PR CI stays ~4 min while the byte-exact layout guard
# still runs regularly. Both jobs parallelize with pytest-xdist.
on:
  pull_request:
  push:
    branches: [master]
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"

# Queue a new run behind one already running for the same branch/PR instead of
# cancelling it. `cancel-in-progress: false` is what makes a fresh push wait its
# turn rather than kill the run in progress. The group is keyed per ref, so
# different branches and PRs still run in parallel — only same-ref runs serialize.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    name: fast tests
    # All ~1,900 fast tests run as ONE pytest-xdist job. Sharding them across
    # separate jobs (pytest-shard) was tried, but it broke ~5 Format 3 /
    # iteminfo tests that rely on schema/registry state the rest of the suite
    # sets up at runtime -- a latent test-isolation issue, out of scope here.
    # xdist within one process keeps that state intact and is green; ~5 min on
    # a healthy runner (slower only while GitHub's Windows fleet is degraded).
    runs-on: windows-latest
    timeout-minutes: 22
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install CDUMM + dev deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Run fast tests
        run: python -m pytest tests/ -q -ra -m "not slow" -n auto --dist worksteal

  slow-tests:
    name: slow integration tests
    # Heavy full-table round-trips. Run on master, nightly, and on demand
    # -- not on every PR, to keep PR feedback fast. Trigger manually on a
    # PR that touches the iteminfo parser/writer.
    if: github.event_name == 'schedule' || github.event_name == 'push'
    runs-on: windows-latest
    timeout-minutes: 35
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install CDUMM + dev deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Run slow tests
        run: python -m pytest tests/ -q -ra -m slow -n auto --dist worksteal
