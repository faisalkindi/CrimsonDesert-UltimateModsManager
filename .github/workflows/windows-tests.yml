name: Windows tests

# Fast per-PR feedback, with the heavy tests split off.
#
# The full-table iteminfo round-trip tests (test_f3_whole_table_growth,
# test_iteminfo_pabgh_companion, test_iteminfo_cd110_layout) parse and
# serialize the real ~6k-record / 5.5MB iteminfo.pabgb in pure Python --
# ~150-530s EACH. Those ~10 tests were the entire reason the suite took
# 25+ min and blew the 15-min cap. They are marked `slow` and run in the
# slow-tests job (master pushes + nightly + on demand) instead of gating
# every PR, so per-PR CI stays ~4 min while the byte-exact layout guard
# still runs regularly. Both jobs parallelize with pytest-xdist.
on:
  pull_request:
  push:
    branches: [master]
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"

jobs:
  test:
    name: fast tests (shard ${{ matrix.shard }})
    # The ~1900 fast tests are sharded across 6 parallel runners (pytest-shard, hash-based even split)
    # so per-PR feedback lands in ~5 min on standard free 2-vCPU GitHub runners.
    # Each shard further parallelizes across its 2 cores with pytest-xdist.
    strategy:
      fail-fast: false
      matrix:
        shard: [0, 1, 2, 3, 4, 5]
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install CDUMM + dev deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Run fast tests (shard ${{ matrix.shard }})
        run: python -m pytest tests/ -q -ra -m "not slow" --shard-id=${{ matrix.shard }} --num-shards=6 -n auto --dist worksteal

  slow-tests:
    name: slow integration tests
    # Heavy full-table round-trips. Run on master, nightly, and on demand
    # -- not on every PR, to keep PR feedback fast. Trigger manually on a
    # PR that touches the iteminfo parser/writer.
    if: github.event_name == 'schedule' || github.event_name == 'push'
    runs-on: windows-latest
    timeout-minutes: 35
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install CDUMM + dev deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Run slow tests
        run: python -m pytest tests/ -q -ra -m slow -n auto --dist worksteal

  gen-durations:
    name: generate test durations
    if: github.event_name == 'workflow_dispatch'
    runs-on: windows-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install CDUMM + dev deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Store durations for the fast (not-slow) suite
        run: python -m pytest tests/ -q -m "not slow" --store-durations --durations-path .test_durations -n auto --dist worksteal
      - name: Upload .test_durations
        uses: actions/upload-artifact@v4
        with:
          name: test-durations
          path: .test_durations
