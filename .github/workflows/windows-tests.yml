name: Windows tests

# Fast per-PR feedback, with the heavy tests split off.
#
# The full-table iteminfo round-trip tests (test_f3_whole_table_growth,
# test_iteminfo_pabgh_companion, test_iteminfo_cd110_layout) parse and
# serialize the real ~6k-record / 5.5MB iteminfo.pabgb in pure Python --
# ~150-530s EACH. Those ~10 tests were the entire reason the suite took
# 25+ min and blew the 15-min cap. They are marked `slow` and run in the
# slow-tests job (master pushes + nightly + on demand) instead of gating
# every PR, so per-PR CI stays ~4 min while the byte-exact layout guard
# still runs regularly. Both jobs parallelize with pytest-xdist.
on:
  pull_request:
  push:
    branches: [master]
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"

# Queue a new run behind one already running for the same branch/PR instead of
# cancelling it. `cancel-in-progress: false` is what makes a fresh push wait its
# turn rather than kill the run in progress. The group is keyed per ref, so
# different branches and PRs still run in parallel — only same-ref runs serialize.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  lint:
    name: lint (ruff)
    # CI never ran ruff at all, so findings only surfaced if someone happened
    # to run it locally.
    #
    # It gates on files a PR ADDS, and only REPORTS on files it modifies.
    # That asymmetry is deliberate: the repo carries ~100 pre-existing
    # findings (apply_engine.py alone has 11, and a dozen more sit in files
    # any real change has to touch). Failing a PR on debt it did not create
    # teaches people to ignore the linter, which is worse than not having
    # one. New code is held to a clean bar; the backlog is visible in the log
    # and gets paid down deliberately, not by ambushing whoever edits the
    # file next.
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
      - name: Install ruff
        run: python -m pip install ruff
      - name: New files must be clean (gate)
        shell: bash
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "pull_request" ]; then
            git fetch --no-tags --depth=50 origin "${GITHUB_BASE_REF}"
            base="origin/${GITHUB_BASE_REF}"
          else
            base="HEAD~1"
          fi
          added=$(git diff --name-only --diff-filter=A "${base}"...HEAD -- '*.py' || true)
          if [ -z "${added}" ]; then
            echo "no new Python files"; exit 0
          fi
          echo "linting new files:"; echo "${added}"
          ruff check ${added}
      - name: Pre-existing debt in touched files (report only)
        if: always()
        shell: bash
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "pull_request" ]; then
            base="origin/${GITHUB_BASE_REF}"
          else
            base="HEAD~1"
          fi
          touched=$(git diff --name-only --diff-filter=M "${base}"...HEAD -- '*.py' || true)
          if [ -z "${touched}" ]; then
            echo "no modified Python files"; exit 0
          fi
          ruff check ${touched} || true

  test:
    name: fast tests
    # All ~1,900 fast tests run as ONE pytest-xdist job. Sharding them across
    # separate jobs (pytest-shard) was tried, but it broke ~5 Format 3 /
    # iteminfo tests that rely on schema/registry state the rest of the suite
    # sets up at runtime -- a latent test-isolation issue, out of scope here.
    # xdist within one process keeps that state intact and is green; ~5 min on
    # a healthy runner (slower only while GitHub's Windows fleet is degraded).
    runs-on: windows-latest
    timeout-minutes: 22
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install CDUMM + dev deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Run fast tests
        run: python -m pytest tests/ -q -ra -m "not slow" -n auto --dist worksteal

  slow-tests:
    name: slow integration tests
    # Heavy full-table round-trips against the REAL 1.13 game table.
    #
    # These used to skip on pull requests (schedule/push only), which meant a
    # PR could be merged green having never touched the real table -- and the
    # real table is where this project's worst bugs live: #285 (76-139 bytes
    # per record carried through undecoded), #293 (byte offsets written into
    # the middle of another record, corrupting the file). A gate that cannot
    # catch the class of bug that actually ships is not a gate.
    #
    # They now run on PRs too. Fast feedback is unaffected: this job runs in
    # PARALLEL with the ~4-minute fast job, so a green tick still arrives
    # quickly; only the merge signal waits. Runner minutes are a cheaper
    # currency than a corrupted save.
    runs-on: windows-latest
    timeout-minutes: 35
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install CDUMM + dev deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Run slow tests
        run: python -m pytest tests/ -q -ra -m slow -n auto --dist worksteal
